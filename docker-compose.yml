services:
  # ==================== Redis ====================
  redis:
    image: redis/redis-stack-server:latest
    container_name: lwy-deepresearch-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: lwy-deepresearch-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deepresearch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ==================== Backend (FastAPI + LangGraph) ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lwy-deepresearch-backend
    restart: unless-stopped
    ports:
      - "2024:2024"
    environment:
      # LLM API
      APP_TOKEN: ${APP_TOKEN:-sk-b67a88b0601941338abadced5c03474c}
      LLM_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
      # Tavily Web Search
      TAVILY_API_KEY: ${TAVILY_API_KEY:-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}
      # Available Models
      AVAILABLE_MODELS: '[{"model_id":"qwen3.7-plus","display_name":"Qwen-Plus","icon":"Zap","icon_color":"orange-400"},{"model_id":"qwen3-max-2026-01-23","display_name":"Qwen-Max","icon":"Cpu","icon_color":"purple-400"}]'
      # Web Search Rate Limiting
      WEB_SEARCH_MAX_QPS: "12"
      # Research Configuration
      NUMBER_OF_INITIAL_QUERIES: "2"
      MAX_RESEARCH_LOOPS: "2"
      # PostgreSQL
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/deepresearch
      # Redis
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - app-network

  # ==================== Frontend (Nginx + React) ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lwy-deepresearch-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

# ==================== Volumes ====================
volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local

# ==================== Network ====================
networks:
  app-network:
    driver: bridge
